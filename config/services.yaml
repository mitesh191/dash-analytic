# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # -------------------------------------------------------------------------
    # Domain / Infrastructure wiring
    # -------------------------------------------------------------------------

    App\Domain\Dashboard\Repository\SiteMetricRepositoryInterface:
        alias: App\Infrastructure\Dashboard\Persistence\DoctrineSiteMetricRepository

    App\Infrastructure\Dashboard\ReadModel\DoctrineDashboardReadModelRepository: ~

    App\Infrastructure\Dashboard\ReadModel\CachedDashboardReadModelRepository:
        arguments:
            $inner: '@App\Infrastructure\Dashboard\ReadModel\DoctrineDashboardReadModelRepository'
            $cache: '@app.cache.dashboard'

    App\Infrastructure\Dashboard\ReadModel\DashboardReadModelRepositoryInterface:
        alias: App\Infrastructure\Dashboard\ReadModel\CachedDashboardReadModelRepository

    # -------------------------------------------------------------------------
    # Monitoring / Logging
    # -------------------------------------------------------------------------

    # Singleton buffer handler — shared between Monolog and the controller
    App\Infrastructure\Monitoring\DashboardRequestLogHandler:
        shared: true

    # Middleware uses the dedicated "dashboard" channel so records are captured
    # by DashboardRequestLogHandler and also written to dev.log
    App\Messenger\Middleware\PerformanceMonitoringMiddleware:
        arguments:
            $logger: '@monolog.logger.dashboard'

    # -------------------------------------------------------------------------
    # CQRS bus injection
    # -------------------------------------------------------------------------

    # Command handler dispatches domain events to the dedicated event bus
    App\Application\Dashboard\Command\RecordSiteMetric\RecordSiteMetricHandler:
        arguments:
            $eventBus: '@event.bus'

    # Projector receives async events and clears the dedicated dashboard pool
    App\Application\Dashboard\EventHandler\SiteMetricProjector:
        arguments:
            $cache: '@app.cache.dashboard'

    # Dashboard controller is read-only — only touches the query bus
    App\Controller\DashboardController:
        arguments:
            $queryBus:       '@query.bus'
            $dashboardLogger: '@monolog.logger.dashboard'
