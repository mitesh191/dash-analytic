framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        # Keep the default bus for Symfony internals (Mailer, Notifier etc.)
        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: ~

            # Synchronous command bus — one handler per command, no return value needed
            command.bus:
                middleware:
                    - id: 'App\Messenger\Middleware\PerformanceMonitoringMiddleware'

            # Synchronous query bus — returns data, read-only side effects
            query.bus:
                middleware:
                    - id: 'App\Messenger\Middleware\PerformanceMonitoringMiddleware'

            # Event bus — domain events are routed to the async transport
            # so the read-model projection never blocks the write request
            event.bus:
                middleware:
                    - id: 'App\Messenger\Middleware\PerformanceMonitoringMiddleware'

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            # Domain events projected asynchronously to avoid coupling
            # the write path to read-model update latency
            App\Domain\Dashboard\Event\SiteMetricRecorded: async
